        :root {
            --bg: #080404;
            --gold: #e0b85f;
            --gold2: #ffe7b0;
            --red: #7f1018;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Manrope', sans-serif;
            background:
                radial-gradient(circle at 50% 18%, rgba(255, 214, 160, 0.18), transparent 24%),
                radial-gradient(circle at 15% 12%, rgba(142, 22, 48, 0.34), transparent 36%),
                radial-gradient(circle at 82% 20%, rgba(255, 180, 126, 0.14), transparent 28%),
                radial-gradient(circle at 50% 78%, rgba(255, 106, 142, 0.1), transparent 30%),

                var(--bg);
            box-shadow: inset 0 0 180px rgba(0, 0, 0, .45);
        }

        #canvas-container {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 50% 30%, rgba(255, 227, 181, .06), transparent 26%),
                radial-gradient(circle at 50% 110%, rgba(122, 8, 32, .2), transparent 44%);
        }

        #loader {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #050202;
            transition: opacity .8s;
        }

        .spinner {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 1px solid rgba(224, 184, 95, .18);
            border-top-color: var(--gold);
            animation: spin 1s linear infinite;
        }

        .loader-text {
            margin-top: 18px;
            color: var(--gold);
            font-size: 12px;
            letter-spacing: .35em;
            text-transform: uppercase;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #ui-layer {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 28px 18px;
        }

        h1 {
            margin: 0;
            font: 700 clamp(34px, 6vw, 68px)/1 'Cinzel', serif;
            letter-spacing: .24em;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff7d4, #f3ca6e 65%, #cc8f2d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 22px rgba(255, 220, 145, .2);
        }

        .subtitle {
            margin-top: 10px;
            color: rgba(255, 236, 194, .72);
            font-size: 11px;
            letter-spacing: .16em;
            text-transform: uppercase;
            text-align: center;
            max-width: 720px;
        }

        .upload-wrapper {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            pointer-events: auto;
            transition: .35s;
        }

        .upload-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 168px;
            padding: 12px 24px;
            border: 1px solid rgba(224, 184, 95, .45);
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(65, 8, 15, .84), rgba(14, 8, 10, .78));
            color: var(--gold2);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: .22em;
            font-size: 11px;
            font-family: inherit;
            backdrop-filter: blur(10px);
            appearance: none;
        }

        .hint-text {
            color: rgba(255, 228, 175, .62);
            font-size: 10px;
            letter-spacing: .12em;
            text-transform: uppercase;
            text-align: center;
        }

        .control-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .ui-hidden {
            opacity: 0;
            transform: translateY(-8px);
            pointer-events: none !important;
        }

        #file-input { display: none; }

        #webcam-wrapper {
            position: fixed;
            right: 20px;
            bottom: 20px;
            z-index: 12;
            width: min(26vw, 250px);
            aspect-ratio: 4 / 3;
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid rgba(224, 184, 95, .38);
            background: linear-gradient(180deg, rgba(31, 7, 11, .82), rgba(8, 4, 5, .92));
            box-shadow: 0 18px 60px rgba(0, 0, 0, .45);
        }

        #webcam-preview {
            width: 100%;
            height: 100%;
            display: block;
        }

        .camera-label {
            position: absolute;
            left: 12px;
            top: 10px;
            padding: 5px 9px;
            border-radius: 999px;
            background: rgba(0, 0, 0, .34);
            color: rgba(255, 230, 170, .92);
            font-size: 10px;
            letter-spacing: .16em;
            text-transform: uppercase;
        }

        #wish-overlay {
            position: fixed;
            inset: 0;
            z-index: 9;
            pointer-events: none;
            opacity: 0;
            transition: opacity .9s ease;
        }

        #wish-overlay.is-visible {
            opacity: 1;
        }

        .wish-column {
            position: absolute;
            bottom: 10vh;
            width: min(24vw, 280px);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .wish-column.left {
            left: clamp(18px, 5vw, 56px);
            align-items: flex-start;
        }

        .wish-column.right {
            right: clamp(84px, 12vw, 180px);
            bottom: 28vh;
            align-items: flex-end;
        }

        .wish-item {
            max-width: 100%;
            padding: 11px 14px;
            border: 1px solid rgba(255, 226, 170, .16);
            border-radius: 18px;
            background: linear-gradient(180deg, rgba(66, 18, 26, .2), rgba(11, 5, 8, .04));
            color: rgba(255, 239, 212, .86);
            font-size: clamp(12px, 1.15vw, 15px);
            line-height: 1.5;
            box-shadow: 0 18px 34px rgba(0, 0, 0, .12);
            backdrop-filter: blur(2px);
            opacity: 0;
            transform: translate3d(0, 68px, 0);
            transition: opacity .85s ease, transform 1.1s cubic-bezier(.2,.8,.2,1);
            will-change: transform, opacity;
        }

        .wish-column.left .wish-item {
            text-align: left;
        }

        .wish-column.right .wish-item {
            text-align: right;
        }

        .wish-item.is-visible {
            opacity: 1;
            animation: wishFloat var(--float-duration, 5.8s) ease-in-out infinite;
            animation-delay: var(--float-delay, 0s);
            transform: translate3d(var(--float-x, 0px), var(--float-y, 0px), 0);
        }

        @keyframes wishFloat {
            0% {
                transform: translate3d(calc(var(--float-x, 0px) * -0.55), calc(var(--float-y, 0px) + 14px), 0);
            }
            25% {
                transform: translate3d(var(--float-x, 0px), calc(var(--float-y, 0px) - 10px), 0);
            }
            50% {
                transform: translate3d(calc(var(--float-x, 0px) * 0.65), calc(var(--float-y, 0px) - 18px), 0);
            }
            75% {
                transform: translate3d(calc(var(--float-x, 0px) * -0.35), calc(var(--float-y, 0px) - 4px), 0);
            }
            100% {
                transform: translate3d(calc(var(--float-x, 0px) * -0.55), calc(var(--float-y, 0px) + 14px), 0);
            }
        }

        @media (max-width: 720px) {
            #webcam-wrapper {
                width: min(40vw, 200px);
                right: 12px;
                bottom: 12px;
                border-radius: 14px;
            }

            .subtitle {
                max-width: 340px;
                line-height: 1.5;
            }

            .wish-column {
                width: min(31vw, 150px);
                bottom: 18vh;
                gap: 10px;
            }

            .wish-column.left {
                left: 10px;
            }

            .wish-column.right {
                right: 10px;
                bottom: 35vh;
            }

            .wish-item {
                padding: 8px 10px;
                font-size: 11px;
                line-height: 1.42;
                border-radius: 14px;
            }
        }
    </style>

        class P {
            constructor(mesh, type, dust = false, index = 0) {
                this.mesh = mesh;
                this.type = type;
                this.dust = dust;
                this.nearStar = !!mesh.userData.isNearStar;
                this.twinkleSpeed = mesh.userData.twinkleSpeed || (0.8 + Math.random() * 2.2);

                this.launch = new THREE.Vector3();

            seed() {
                const b = CFG.box;
                this.packed.set((Math.random() - .5) * b.w * .35, -b.h * .18 + Math.random() * b.h * .45, (Math.random() - .5) * b.d * .35);
                const a = Math.random() * Math.PI * 2;
                this.launch.set((Math.random() - .5) * 16, 11 + Math.random() * 9, (Math.random() - .5) * 9);
                if (this.dust) {
                    const r = 10 + Math.random() * 22;
                    const h = -8 + Math.random() * 22;
                    this.burst.set(Math.cos(a) * r, h, Math.sin(a) * r);
                    this.textTarget.set((Math.random() - .5) * 26, 8 + (Math.random() - .5) * 10, (Math.random() - .5) * 4);

                const burst = THREE.MathUtils.smoothstep(open, .12, .92);

                    target.z = THREE.MathUtils.lerp(target.z, this.textTarget.z, happyLock * .9999);

                        Math.sin(time * .34 + this.orbitPhase) * (3.8 + this.orbitRadius * .06)
                    );
                    target.lerp(nameOrbit, THREE.MathUtils.smoothstep(nameMix, .08, .28));
                } else if (!this.dust && S.closeLoveMix > .08 && this.type !== 'PHOTO') {
                    const closeOrbit = new THREE.Vector3(
                        Math.cos(time * .28 + this.orbitPhase) * (11.5 + this.orbitRadius * .2),
                        2.8 + Math.sin(time * .62 + this.orbitPhase) * .9,
                        Math.sin(time * .28 + this.orbitPhase) * (7.4 + this.orbitRadius * .1)
                    );
                    target.lerp(closeOrbit, THREE.MathUtils.smoothstep(S.closeLoveMix, .08, .28));
                } else {

                        target.y = THREE.MathUtils.lerp(target.y, this.closeTarget.y, lock * .9996);
                        target.z = THREE.MathUtils.lerp(target.z, this.closeTarget.z, lock * .9998);
                    } else if (nameMix > .08) {
                        const lock = THREE.MathUtils.smoothstep(nameMix, .04, .1);
                        target.x = THREE.MathUtils.lerp(target.x, this.nameTarget.x, lock * .9992);
                        target.y = THREE.MathUtils.lerp(target.y, this.nameTarget.y, lock * .9992);
                        target.z = THREE.MathUtils.lerp(target.z, this.nameTarget.z, lock * .9996);

                        const speed = this.nearStar ? 0.28 : 1.0;
                        const swirl = (this.nearStar ? 0.0015 : 0.004) + ambientMix * (this.nearStar ? 0.05 : 0.16);

                    }
                } else if (burst > .02) {
                    const amp = this.type === 'PHOTO' ? .52 : .18;
                    const happyDriftDamp = this.type === 'PHOTO' ? 1 : (1 - THREE.MathUtils.smoothstep(happyMix, .08, .3) * .992);
                    target.x += Math.cos(time * .6 + this.off) * amp * floatMix * happyDriftDamp;
                    target.y += Math.sin(time * 1.15 + this.off) * (.2 + amp) * floatMix * happyDriftDamp;
                    target.z += Math.sin(time * .7 + this.off) * amp * floatMix * happyDriftDamp;
                    if (this.type !== 'PHOTO' && happyMix > .08) {
                        const alive = 1 - THREE.MathUtils.smoothstep(happyMix, .08, .32) * .82;
                        target.x += Math.cos(time * .95 + this.orbitPhase) * .018 * alive;
                        target.y += Math.sin(time * 1.28 + this.orbitPhase) * .028 * alive;
                    }
                }

                if (S.target === 0 && S.closeLoveTimer <= 0) {
                    const closeMix = THREE.MathUtils.smoothstep(1 - open, .04, .98);
                    const gatherMix = THREE.MathUtils.smoothstep(closeMix, .08, .72);
                    const sealMix = THREE.MathUtils.smoothstep(closeMix, .93, .995);
                    const swirlMix = 1 - sealMix;
                    const layer = this.dust ? (this.nearStar ? 0 : 2) : (this.type === 'PHOTO' ? 1 : 1.5);
                    const angle = time * (8.8 - layer * 1.2) + this.off * 7.5;
                    const radius = (10.5 + layer * 2.8) * (1 - gatherMix) + 0.22 * (1 - sealMix);
                    const vortexTarget = new THREE.Vector3(
                        Math.cos(angle) * radius,
                        this.packed.y + 6.2 * swirlMix + layer * 0.55 + Math.sin(angle * 1.5) * 0.14 * swirlMix,
                        Math.sin(angle) * radius * (0.34 + layer * 0.05)
                    );
                    target.copy(vortexTarget.lerp(this.packed, sealMix));
                }

                const collapseBoost = S.target === 0 ? 0.92 : 1;
                const moveRate = (this.dust ? (this.nearStar ? 0.55 : 1.5) : 2.4) * collapseBoost;
                this.mesh.position.lerp(target, moveRate * dt * 4);
                const spinRate = S.target === 0 ? (this.dust ? 3.2 : 2.6) : (this.dust && this.nearStar ? 0.18 : (.3 + burst * 1.3 + floatMix * .8));
                this.mesh.rotation.x += this.spin.x * dt * spinRate;
                this.mesh.rotation.y += this.spin.y * dt * spinRate;
                this.mesh.rotation.z += this.spin.z * dt * spinRate;

                let scale;
                if (this.dust) {
                    scale = this.base * (.05 + happyMix * 0.72 + nameMix * 2.25 + S.closeLoveMix * 3.8 + floatMix * .2 + .001 * Math.sin(time * 2.2));
                } else if (this.type === 'PHOTO') {
                    scale = this.base * (.58 + burst * .34 + Math.max(textMix, floatMix) * .78);
                } else {
                    const happyBuild = THREE.MathUtils.smoothstep(happyMix, .04, .22);
                    const happyTight = 1 - THREE.MathUtils.smoothstep(happyMix, .08, .28) * .18;
                    scale = this.base * (.1 + burst * .14 + happyBuild * .94 + nameMix * 1.2 + floatMix * .18) * happyTight;
                }
                let targetScale = scale;
                if (S.target === 0 && S.closeLoveTimer <= 0) {
                    const closeMix = THREE.MathUtils.smoothstep(1 - open, .04, .98);
                    const sealMix = THREE.MathUtils.smoothstep(closeMix, .93, .995);
                    targetScale *= 1 - sealMix * 0.55;
                }
                if (this.dust) {
                    const twinkle = 0.84 + Math.max(0, Math.sin(time * this.twinkleSpeed + this.twinklePhase)) * this.twinkleStrength;
                    targetScale *= twinkle;
                    if (this.mesh.material) {
                        if (S.closeLoveMix > .08) this.mesh.material.color.setHex(0xff2038);
                        else if (this.baseColor) this.mesh.material.color.setHex(this.baseColor);
                        this.mesh.material.opacity = THREE.MathUtils.clamp(
                            (this.nearStar ? 0.12 : 0.05) + twinkle * (this.nearStar ? 0.4 : 0.16) + S.closeLoveMix * 0.28,
                            0,
                            1
                        );
                    }
                }
                this.mesh.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 8 * dt);

                if (this.type === 'PHOTO') {
                    if (focusPhoto === this.mesh && S.focus > .02) {
                        if (this.mesh.parent !== focusLayer) focusLayer.attach(this.mesh);
                        const focusTarget = new THREE.Vector3(0, 0, 0);
                        this.mesh.position.copy(focusTarget);
                        const focusScale = this.base * (1.7 + S.focus * 1.25);
                        this.mesh.scale.setScalar(focusScale);
                        this.mesh.rotation.set(0, 0, 0);
                        this.mesh.renderOrder = 999;
                        this.mesh.traverse((child) => {
                            if (child.material) {
                                child.renderOrder = 999;
                                child.material.depthTest = false;
                                child.material.depthWrite = false;
                            }
                        });
                        if (this.mesh.userData.halo?.material) {
                            this.mesh.userData.halo.material.opacity = 0;
                        }
                        if (this.mesh.children[1]?.material) {
                            this.mesh.children[1].material.emissiveIntensity = this.mesh.userData.baseFrameEmissive ?? 0;
                            this.mesh.children[1].material.color.setHex(CFG.gold);
                        }
                    } else {
                        if (this.mesh.parent === focusLayer) photoGroup.attach(this.mesh);
                        this.mesh.renderOrder = 0;
                        this.mesh.traverse((child) => {
                            if (child.material) {
                                child.renderOrder = 0;
                                child.material.depthTest = true;
                                child.material.depthWrite = true;
                            }
                        });
                        const tilt = Math.sin(time * .8) * .03 * Math.max(textMix, floatMix);
                        this.mesh.rotation.x = THREE.MathUtils.lerp(this.mesh.rotation.x, tilt, dt * 3.5);
                        this.mesh.rotation.z = THREE.MathUtils.lerp(this.mesh.rotation.z, -tilt * .6, dt * 3.5);
                        if (this.mesh.userData.halo?.material) {
                            this.mesh.userData.halo.material.opacity = THREE.MathUtils.lerp(this.mesh.userData.halo.material.opacity, 0, dt * 8);
                        }
                        if (this.mesh.children[1]?.material) {
                            this.mesh.children[1].material.emissiveIntensity = THREE.MathUtils.lerp(this.mesh.children[1].material.emissiveIntensity, this.mesh.userData.baseFrameEmissive ?? 0, dt * 8);
                            this.mesh.children[1].material.color.setHex(CFG.gold);
                        }
                        if (textMix > .08 || floatMix > .08) this.mesh.lookAt(camera.position);
                    }
                }
            }
        }

        function createBowWing(material, side = 1) {
            const wing = new THREE.Group();
            const wingShape = new THREE.Shape();
            wingShape.moveTo(0.0, 0.0);
            wingShape.bezierCurveTo(0.4, 0.44, 1.02, 0.7, 1.62, 0.5);
            wingShape.bezierCurveTo(1.92, 0.34, 2.02, 0.08, 1.88, -0.14);
            wingShape.bezierCurveTo(1.54, -0.48, 0.92, -0.66, 0.2, -0.38);
            wingShape.bezierCurveTo(-0.08, -0.28, -0.15, -0.1, 0.0, 0.0);
            const wingGeo = new THREE.ExtrudeGeometry(wingShape, {
                depth: 0.18,
                bevelEnabled: true,
                bevelSegments: 4,
                steps: 1,
                bevelSize: 0.06,
                bevelThickness: 0.045,
                curveSegments: 20
            });
            wingGeo.center();
            const wingMesh = new THREE.Mesh(wingGeo, material);
            wingMesh.rotation.y = side < 0 ? Math.PI : 0;
            wingMesh.scale.set(0.96, 1.02, 0.96);
            wing.add(wingMesh);

            const pinch = new THREE.Mesh(new THREE.CapsuleGeometry(0.15, 0.3, 4, 8), material);
            pinch.rotation.z = Math.PI / 2;
            pinch.position.set(side * -0.06, -0.01, 0.06);
            pinch.scale.set(0.98, 0.74, 0.68);
            wing.add(pinch);

            const fold = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.72, 0.12), material);
            fold.position.set(side * 0.34, -0.02, -0.04);
            fold.rotation.set(0.14, 0.06 * side, side * -0.28);
            wing.add(fold);
            return wing;
        }

        function createBowTail(material, side = 1) {
            const tail = new THREE.Group();
            const tailShape = new THREE.Shape();
            tailShape.moveTo(-0.24, 1.24);
            tailShape.lineTo(0.24, 1.24);
            tailShape.bezierCurveTo(0.34, 0.66, 0.32, 0.08, 0.13, -1.02);
            tailShape.lineTo(0, -1.24);
            tailShape.lineTo(-0.13, -1.02);
            tailShape.bezierCurveTo(-0.32, 0.08, -0.34, 0.66, -0.24, 1.24);
            const tailGeo = new THREE.ExtrudeGeometry(tailShape, {
                depth: 0.14,
                bevelEnabled: true,
                bevelSegments: 3,
                steps: 1,
                bevelSize: 0.035,
                bevelThickness: 0.03,
                curveSegments: 16
            });
            tailGeo.center();
            const tailMesh = new THREE.Mesh(tailGeo, material);
            tailMesh.scale.set(0.88, 1.08, 0.95);
            tail.add(tailMesh);

            const crease = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.72, 0.1), material);
            crease.position.set(side * 0.05, 0.62, 0.04);
            crease.rotation.z = side * 0.08;
            tail.add(crease);
            return tail;
        }

        function generateTextTargets(count) {
            const canvas = document.createElement('canvas');
            canvas.width = 1900;
            canvas.height = 760;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = '700 360px Cinzel';
            ctx.fillText('Happy', canvas.width / 2, 190);
            ctx.font = '700 400px Cinzel';
            ctx.fillText('Birthday', canvas.width / 2, 500);

            const img = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const points = [];
            for (let y = 0; y < canvas.height; y += 1) {
                for (let x = 0; x < canvas.width; x += 1) {
                    const a = img[(y * canvas.width + x) * 4 + 3];
                    if (a > 40) points.push(new THREE.Vector3((x - canvas.width / 2) * .0215, (canvas.height / 2 - y) * .0218 + 7.0, 0));
                }
            }
            for (let i = points.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [points[i], points[j]] = [points[j], points[i]];
            }
            const out = [];
            for (let i = 0; i < count; i++) {
                const basePoint = points[i % points.length] || new THREE.Vector3(0, 10, 0);
                out.push(basePoint.clone().add(new THREE.Vector3((Math.random() - .5) * .00003, (Math.random() - .5) * .00003, 0)));
            }
            return out;
        }

        function chooseFocusPhoto() {
            if (!photoItems.length) return null;
            let best = photoItems[0];
            let bestScore = Infinity;
            for (const group of photoItems) {
                const score = Math.abs(group.position.x) + Math.abs(group.position.y - 8.5) * .6 + Math.abs(group.position.z);
                if (score < bestScore) {
                    bestScore = score;
                    best = group;
                }
            }
            return best;
        }
        function cycleFocusPhoto() {
            if (!photoItems.length) return null;
            if (!focusPhoto) return chooseFocusPhoto();
            const idx = photoItems.indexOf(focusPhoto);
            return photoItems[(idx + 1) % photoItems.length] || focusPhoto;
        }

        function sampleGiftPoint(object, size) {
            const local = new THREE.Vector3(
                (Math.random() - .5) * size.x,
                (Math.random() - .5) * size.y,
                (Math.random() - .5) * size.z
            );
            object.updateWorldMatrix(true, false);
            return local.applyMatrix4(object.matrixWorld);
        }

        function clearGiftFragments() {
            giftFragments.forEach(({ mesh }) => {
                mesh.geometry.dispose();
                mesh.material.dispose();
                scene.remove(mesh);
            });
            giftFragments = [];
        }

        function spawnGiftFragments() {
            clearGiftFragments();
            const parts = [
                { object: base, size: new THREE.Vector3(CFG.box.w, CFG.box.h, CFG.box.d), count: 104, color: CFG.red, lift: .45 },
                { object: lid, size: new THREE.Vector3(CFG.box.w + .9, CFG.box.lid, CFG.box.d + .9), count: 58, color: 0x8b111a, lift: .38 },
                { object: rv, size: new THREE.Vector3(CFG.box.ribbon, CFG.box.h + CFG.box.lid + .4, CFG.box.d + 1.2), count: 48, color: CFG.gold, lift: .32 },
                { object: rh, size: new THREE.Vector3(CFG.box.w + 1.2, CFG.box.h + CFG.box.lid + .4, CFG.box.ribbon), count: 48, color: CFG.gold, lift: .32 },
                { object: bow, size: new THREE.Vector3(4.8, 3.6, 3.2), count: 76, color: CFG.gold2, lift: .52 }
            ];

            parts.forEach((part) => {
                for (let i = 0; i < part.count; i++) {
                    const size = .06 + Math.random() * .11;
                    const geo = new THREE.CircleGeometry(size, 3);
                    geo.rotateZ(Math.random() * Math.PI * 2);
                    const mat = new THREE.MeshPhysicalMaterial({
                        color: part.color,
                        side: THREE.DoubleSide,
                        transparent: true,
                        opacity: .96,
                        metalness: .16,
                        roughness: .52,
                        clearcoat: .18,
                        emissive: part.color,
                        emissiveIntensity: .08,
                        depthWrite: false
                    });
                    const mesh = new THREE.Mesh(geo, mat);
                    const origin = sampleGiftPoint(part.object, part.size);
                    const closeTarget = (closeTargets[Math.floor(Math.random() * closeTargets.length)] || new THREE.Vector3(0, 6.5, 0)).clone();
                    const scatter = new THREE.Vector3(
                        (Math.random() - .5) * (.82 + part.lift * .34),
                        .16 + Math.random() * (.14 + part.lift * .22),
                        (Math.random() - .5) * (.82 + part.lift * .34)
                    );
                    mesh.position.copy(origin);
                    mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                    scene.add(mesh);
                    giftFragments.push({
                        mesh,
                        origin,
                        scatter,
                        closeTarget,
                        orbitRadius: .45 + Math.random() * 1.2,
                        orbitPhase: Math.random() * Math.PI * 2,
                        layer: 1.1 + Math.random() * 1.2,
                        off: Math.random() * 9,
                        spin: new THREE.Vector3((Math.random() - .5) * 1.05, (Math.random() - .5) * 1.05, (Math.random() - .5) * 1.05),
                        scale: .76 + Math.random() * .34,
                        delay: (i % 4) * 0.015 + Math.random() * 0.01
                    });
                }
            });
        }

        function updateGiftFragments(dt) {
            if (!giftFragments.length) return;
            giftFragments.forEach((fragment) => {
                const life = THREE.MathUtils.clamp((S.disintegrateTimer - fragment.delay) / (.7 - fragment.delay), 0, 1);
                const ease = 1 - ((1 - life) * (1 - life));
                fragment.mesh.visible = life > 0 && life < 1;
                if (!fragment.mesh.visible) return;
                const time = clock.elapsedTime + fragment.off;
                const shatterMix = THREE.MathUtils.smoothstep(life, 0, .22);
                const settleMix = THREE.MathUtils.smoothstep(life, .1, .26);
                const gatherMix = THREE.MathUtils.smoothstep(Math.max(S.closeLoveMix, life), .3, .62);
                const orbitRadius = fragment.orbitRadius * (1 - gatherMix * .92);
                const orbitTarget = new THREE.Vector3(
                    fragment.closeTarget.x + Math.cos(time * (1.8 + fragment.layer * .24) + fragment.orbitPhase) * orbitRadius,
                    fragment.closeTarget.y + Math.sin(time * (2.2 + fragment.layer * .3) + fragment.orbitPhase) * (0.16 + orbitRadius * .2),
                    fragment.closeTarget.z + Math.sin(time * (1.8 + fragment.layer * .24) + fragment.orbitPhase) * orbitRadius * .62
                );
                const burstTarget = fragment.origin.clone().addScaledVector(fragment.scatter, shatterMix * (1.05 + settleMix * 0.18));
                const flowTarget = burstTarget.clone().lerp(orbitTarget, gatherMix * .68);
                flowTarget.lerp(fragment.closeTarget, gatherMix * .985);
                fragment.mesh.position.lerp(flowTarget, Math.min(1, dt * (7.1 + settleMix * 3.8 + gatherMix * 7.4)));
                fragment.mesh.rotation.x += fragment.spin.x * dt;
                fragment.mesh.rotation.y += fragment.spin.y * dt;
                fragment.mesh.rotation.z += fragment.spin.z * dt;
                const scale = fragment.scale * (1 - ease * .66);
                fragment.mesh.scale.setScalar(scale);
                fragment.mesh.material.opacity = .96;
            });
        }

        function createParticles() {
            const sphereGeo = new THREE.SphereGeometry(.42, 20, 20);
            const boxGeo = new THREE.BoxGeometry(.55, .55, .55);
            const goldMat = new THREE.MeshStandardMaterial({ color: CFG.gold, metalness: .95, roughness: .12, emissive: 0x463008, emissiveIntensity: .34 });
            const redMat = new THREE.MeshPhysicalMaterial({ color: 0xb31f28, metalness: .32, roughness: .25, clearcoat: 1, emissive: 0x32070d, emissiveIntensity: .3 });
            const amberMat = new THREE.MeshStandardMaterial({ color: 0xffcf7a, metalness: .45, roughness: .18, emissive: 0x6c4205, emissiveIntensity: .58 });
            for (let i = 0; i < CFG.count; i++) {
                const roll = Math.random();
                let mesh;
                let type = 'BOX';
                if (roll < .28) {
                    mesh = new THREE.Mesh(boxGeo, redMat);
                    type = 'RED';
                } else if (roll < .52) {
                    mesh = new THREE.Mesh(boxGeo, goldMat);
                    type = 'GOLD';
                } else {
                    mesh = new THREE.Mesh(sphereGeo, amberMat);
                    type = 'SPHERE';
                }
                mesh.scale.setScalar(.35 + Math.random() * .35);
                main.add(mesh);
                particles.push(new P(mesh, type, false, particleOrdinal++));
            }
        }

        function createDust() {
            const geo = new THREE.TetrahedronGeometry(.08, 0);
            const palette = [0xe9f2ff, 0xc9dcff, 0x9fc4ff, 0x9ee7ff, 0xffefc0, 0xb7c8ff];
            for (let i = 0; i < CFG.dust; i++) {
                const isNearStar = i % 29 === 0;
                const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
                    color: palette[i % palette.length],

                }));
                mesh.userData.isNearStar = isNearStar;
                mesh.userData.twinkleSpeed = 1.2 + Math.random() * 4.5;
                mesh.userData.twinklePhase = Math.random() * Math.PI * 2;
                mesh.userData.twinkleStrength = isNearStar ? (0.3 + Math.random() * 0.14) : (0.1 + Math.random() * 0.08);
                mesh.scale.setScalar(isNearStar ? (0.45 + Math.random() * 0.85) : (0.18 + Math.random() * 0.62));
                main.add(mesh);
                particles.push(new P(mesh, 'DUST', true, particleOrdinal++));
            }
        }

        function addPhoto(texture) {
            const frame = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.8, .08), new THREE.MeshStandardMaterial({ color: CFG.gold, metalness: 1, roughness: .14, emissive: 0x5b3c09, emissiveIntensity: 0 }));
            const photoMat = new THREE.MeshBasicMaterial({ map: texture });
            photoMat.toneMapped = false;
            const photo = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 1.5), photoMat);
            const halo = new THREE.Mesh(
                new THREE.PlaneGeometry(2.4, 2.4),
                new THREE.MeshBasicMaterial({ color: 0xffe7a8, transparent: true, opacity: 0, depthWrite: false })
            );
            const group = new THREE.Group();
            halo.position.z = -0.08;
            photo.position.z = .05;
            group.add(halo, frame, photo);
            group.scale.setScalar(.92);
            group.userData.baseFrameEmissive = 0;
            group.userData.halo = halo;
            photoGroup.add(group);
            photoItems.push(group);
            particles.push(new P(group, 'PHOTO', false, particleOrdinal++));
        }

        function loadTexture(src) {
            return new Promise((resolve, reject) => {
                new THREE.TextureLoader().load(src, (texture) => {
                    texture.colorSpace = THREE.SRGBColorSpace;
                    resolve(texture);
                }, undefined, reject);
            });
        }

        function loadTextureFromFile(file) {
            return new Promise((resolve, reject) => {
                const objectUrl = URL.createObjectURL(file);
                new THREE.TextureLoader().load(objectUrl, (texture) => {
                    texture.colorSpace = THREE.SRGBColorSpace;
                    texture.userData.objectUrl = objectUrl;
                    resolve(texture);
                }, undefined, (error) => {
                    URL.revokeObjectURL(objectUrl);
                    reject(error);
                });
            });
        }

        function disposePhotoGroup(group) {
            group.traverse((child) => {
                const materials = child.material ? (Array.isArray(child.material) ? child.material : [child.material]) : [];
                materials.forEach((material) => {
                    if (material.map) {
                        const url = material.map.userData?.objectUrl;
                        if (url) URL.revokeObjectURL(url);
                        material.map.dispose();
                    }
                });
                if (child.material) {
                    materials.forEach((material) => material.dispose());
                }
                if (child.geometry) child.geometry.dispose();
            });
            if (group.parent) group.parent.remove(group);
        }

        function clearPhotos() {
            focusPhoto = null;
            photoItems.forEach(disposePhotoGroup);
            photoItems = [];
            particles = particles.filter((particle) => particle.type !== 'PHOTO');
        }

        async function loadPhotoSet(texturePromises) {
            const loadVersion = ++photoLoadVersion;
            clearPhotos();
            const textures = await Promise.allSettled(texturePromises);
            if (loadVersion !== photoLoadVersion) {
                textures.forEach((result) => {
                    if (result.status === 'fulfilled') {
                        const url = result.value.userData?.objectUrl;
                        if (url) URL.revokeObjectURL(url);
                        result.value.dispose();
                    }
                });
                return;
            }
            textures.forEach((result) => {
                if (result.status === 'fulfilled') addPhoto(result.value);
                else console.warn('Khong tai duoc anh:', result.reason);
            });
        }

        function loadDefaultPhotos() {
            if (userUploadedPhotos) return;
            loadPhotoSet(DEFAULT_IMAGE_PATHS.map((src) => loadTexture(src)));
        }

        function updateWishes(dt) {
            const wishesReady = S.closeLoveMix > 0.98 && S.hasOpenedOnce && S.target === 0;
            if (wishesReady) S.wishTimer = Math.min(10, S.wishTimer + dt);
            else S.wishTimer = Math.max(0, S.wishTimer - dt * 2.4);

            S.wishMix = THREE.MathUtils.smoothstep(S.wishTimer, 0.18, 1.2);

            if (wishOverlay) {
                wishOverlay.classList.toggle('is-visible', S.wishMix > 0.03);
                wishOverlay.setAttribute('aria-hidden', S.wishMix > 0.03 ? 'false' : 'true');

        async function media() {
            video = document.getElementById('webcam');
            camCanvas = document.getElementById('webcam-preview');
            camCtx = camCanvas.getContext('2d');
            sizeCam();
            const vision = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm');
            landmarker = await HandLandmarker.createFromOptions(vision, { baseOptions: { modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task', delegate: 'GPU' }, runningMode: 'VIDEO', numHands: 1 });
            if (navigator.mediaDevices?.getUserMedia) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                    video.srcObject = stream;
                    video.addEventListener('loadeddata', () => { sizeCam(); tickCam(); }, { once: true });
                } catch (e) {
                    camMsg('Camera access blocked');
                    console.error(e);
                }
            } else camMsg('Camera unsupported');
        }

        function sizeCam() {
            camCanvas.width = camCanvas.clientWidth || 240;
            camCanvas.height = camCanvas.clientHeight || 180;
        }

        function camMsg(text) {
            if (!camCtx) return;
            camCtx.fillStyle = '#080404';
            camCtx.fillRect(0, 0, camCanvas.width, camCanvas.height);
            camCtx.fillStyle = 'rgba(255,229,178,.8)';
            camCtx.font = '13px Manrope';
            camCtx.textAlign = 'center';
            camCtx.fillText(text, camCanvas.width / 2, camCanvas.height / 2);
        }

        function tickCam() {
            if (video.readyState >= 2 && landmarker && video.currentTime !== lastVideo) {
                lastVideo = video.currentTime;
                const res = landmarker.detectForVideo(video, performance.now());
                gestures(res);
                drawCam(res);
            } else if (video.readyState < 2) camMsg('Waiting for camera');
            requestAnimationFrame(tickCam);
        }

        function gestures(res) {
            if (res.landmarks?.length) {
                const lm = res.landmarks[0], wrist = lm[0], tips = [lm[8], lm[12], lm[16], lm[20]];
                const thumbTip = lm[4], indexTip = lm[8], middleTip = lm[12], middleBase = lm[9];
                let openness = 0;
                tips.forEach((t) => openness += Math.hypot(t.x - wrist.x, t.y - wrist.y));
                openness /= tips.length;

                const palmDirection = ((middleBase.x - wrist.x) * 3.2) + ((lm[5].x - lm[17].x) * 0.8);
                const normalizedPalm = THREE.MathUtils.clamp(palmDirection, -1, 1);
                const pinch = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y);
                const middlePinch = Math.hypot(thumbTip.x - middleTip.x, thumbTip.y - middleTip.y);
                const pinchOn = pinch < .055;
                const cycleOn = pinchOn && middlePinch < .07;

                S.hand.det = true;
                S.hand.open += (openness - S.hand.open) * .18;
                S.hand.x += (((lm[9].x - .5) * 2) - S.hand.x) * .18;
                S.hand.y += (((lm[9].y - .5) * 2) - S.hand.y) * .18;
                S.hand.palm += (normalizedPalm - S.hand.palm) * .08;
                S.hand.pinch += ((pinchOn ? 1 : 0) - S.hand.pinch) * .14;
                if (S.hand.open > .4) S.target = 1;
                else if (S.hand.open < .27) S.target = 0;

                if (cycleOn && !S.hand.changeLock && photoItems.length && S.open > .55) {
                    focusPhoto = cycleFocusPhoto();
                    S.hand.changeLock = 1;
                } else if (!cycleOn) {
                    S.hand.changeLock = 0;
                }

                if (S.hand.pinch > .55 && photoItems.length && S.open > .55) {
                    focusPhoto = focusPhoto || chooseFocusPhoto();
                    S.focus += (1 - S.focus) * .18;
                } else {
                    S.focus += (0 - S.focus) * .14;
                    if (S.focus < .08) focusPhoto = null;
                }
            } else {
                S.hand.det = false;
                S.hand.open += (0 - S.hand.open) * .12;
                S.hand.palm += (0 - S.hand.palm) * .08;
                S.hand.pinch += (0 - S.hand.pinch) * .12;
                S.hand.changeLock = 0;
                S.focus += (0 - S.focus) * .12;
                if (S.focus < .08) focusPhoto = null;
            }
        }

        function drawCam(res) {
            const w = camCanvas.width, h = camCanvas.height;
            camCtx.clearRect(0, 0, w, h);
            if (video.readyState >= 2) {
                camCtx.save();
                camCtx.translate(w, 0);
                camCtx.scale(-1, 1);
                camCtx.drawImage(video, 0, 0, w, h);
                camCtx.restore();
            } else {
                camCtx.fillStyle = '#080404';
                camCtx.fillRect(0, 0, w, h);
            }
            const grad = camCtx.createLinearGradient(0, 0, 0, h);
            grad.addColorStop(0, 'rgba(18,3,6,.08)');
            grad.addColorStop(1, 'rgba(18,3,6,.28)');
            camCtx.fillStyle = grad;
            camCtx.fillRect(0, 0, w, h);
            if (!res.landmarks?.length) return;
            const lm = res.landmarks[0];
            camCtx.lineWidth = 2;
            camCtx.strokeStyle = 'rgba(255,205,110,.95)';
            camCtx.shadowColor = 'rgba(255,170,70,.55)';
            camCtx.shadowBlur = 10;
            BONES.forEach(([a, b]) => {
                camCtx.beginPath();
                camCtx.moveTo((1 - lm[a].x) * w, lm[a].y * h);
                camCtx.lineTo((1 - lm[b].x) * w, lm[b].y * h);
                camCtx.stroke();
            });
            lm.forEach((p, i) => {
                camCtx.beginPath();
                camCtx.fillStyle = i === 8 ? 'rgba(255,244,188,.98)' : 'rgba(255,188,88,.95)';
                camCtx.arc((1 - p.x) * w, p.y * h, i === 0 ? 5 : i % 4 === 0 ? 4.5 : 3.2, 0, Math.PI * 2);
                camCtx.fill();
            });
        }

            bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.4, .5, .82);
            bloomPass.threshold = .86;
            bloomPass.strength = .34;

            composer.addPass(bloomPass);
        }

        function updateGift(dt) {
            const closing = S.target === 0;
            S.open += (S.target - S.open) * Math.min(1, dt * (closing ? 2.25 : 3.8));
            const closePhase = THREE.MathUtils.smoothstep(1 - S.open, .08, .98);
            const sealPhase = THREE.MathUtils.smoothstep(closePhase, .93, .995);
            const latchPhase = THREE.MathUtils.smoothstep(closePhase, .985, .999);
            const latchTarget = closing ? 1 - latchPhase : S.open;
            S.ribbon += (latchTarget - S.ribbon) * Math.min(1, dt * (closing ? 3.4 : 4.6));
            S.lid += (latchTarget - S.lid) * Math.min(1, dt * (closing ? 3.1 : 2.8));
            S.burst += (S.open - S.burst) * Math.min(1, dt * (closing ? 2.15 : 2.6));

            if (S.open > .9) {
                S.hasOpenedOnce = true;
                S.disintegrateArmed = true;
                tryPlayMusic();
            }

            if (S.target === 1 && S.open > .96) S.celebrate = Math.min(12, S.celebrate + dt);
            else S.celebrate = Math.max(0, S.celebrate - dt * 3.6);

            S.act1Mix = THREE.MathUtils.smoothstep(S.celebrate, 0.0, 1.0);
            S.act2Mix = THREE.MathUtils.smoothstep(S.celebrate, 1.1, 2.0);
            S.act3Mix = THREE.MathUtils.smoothstep(S.celebrate, 3.7, 4.8);
            S.happyMix = THREE.MathUtils.smoothstep(S.celebrate, 1.2, 1.9) * (1 - THREE.MathUtils.smoothstep(S.celebrate, 4.35, 4.8));
            S.nameMix = THREE.MathUtils.smoothstep(S.celebrate, 4.1, 4.9) * (1 - THREE.MathUtils.smoothstep(S.celebrate, 7.0, 7.5));
            S.romanceMix = THREE.MathUtils.smoothstep(S.celebrate, 4.4, 5.4);
            if (!closing || !S.hasOpenedOnce) {
                S.closeLoveTimer = 0;
            } else if (S.lid < 0.08 && S.ribbon < 0.08) {
                S.closeLoveTimer = Math.min(12, S.closeLoveTimer + dt);
            }
            S.closeLoveMix = closing && S.hasOpenedOnce
                ? THREE.MathUtils.smoothstep(S.closeLoveTimer, 0.0, 0.4)
                : 0;
            S.textMix = Math.max(S.happyMix, S.nameMix);
            S.floatMix = THREE.MathUtils.smoothstep(S.celebrate, 5.4, 6.15);
            S.boxHide = closing
                ? 0
                : THREE.MathUtils.smoothstep(S.celebrate, 1.15, 1.95);

            const fullyClosed = closing && S.open < .035 && S.lid < .035 && S.ribbon < .035;
            if (!S.disintegrateStarted && !S.disintegrated) {
                if (fullyClosed && S.disintegrateArmed && S.hasOpenedOnce) {
                    S.disintegrateStarted = true;
                    S.disintegrateArmed = false;
                    S.disintegrateTimer = 0;
                    clearGiftFragments();
                }
            }

            if (S.disintegrateStarted) {
                S.disintegrateTimer = Math.min(.58, S.disintegrateTimer + dt);
                S.disintegrateMix = THREE.MathUtils.smoothstep(S.disintegrateTimer / .58, 0, 1);
                if (S.disintegrateTimer >= .58) {
                    S.disintegrated = true;
                }
            } else if (!S.disintegrated) {
                S.disintegrateMix = 0;
            }

            const ribbon = THREE.MathUtils.smoothstep(S.ribbon, .04, .85) * (1 - S.boxHide);
            const stageHold = 1 - THREE.MathUtils.smoothstep(S.celebrate, .78, 1.25) * .18;
            const lidOpen = THREE.MathUtils.smoothstep(S.lid, .08, .96) * stageHold * (1 - S.boxHide * .2);
            const burst = THREE.MathUtils.smoothstep(S.burst, .18, .98);
            const flutter = Math.sin(clock.elapsedTime * 4.2) * .08 * burst;
            const boxOpacity = S.disintegrated ? 0 : (1 - S.boxHide);
            const collapseMix = S.disintegrated ? 1 : S.disintegrateMix;
            const collapsePull = THREE.MathUtils.smoothstep(collapseMix, 0, .94);
            const collapseScale = Math.max(.001, 1 - collapsePull * .985);
            const collapseCenter = new THREE.Vector3(0, CFG.box.h * .08, 0);
            const romanceGlow = Math.max(S.romanceMix, S.closeLoveMix * .85);

            rv.position.x = ribbon * 3.4;
            rv.position.y = .7 + ribbon * .25;
            rh.position.z = -ribbon * 3.4;
            rh.position.y = .7 + ribbon * .12;
            rv.scale.set(1 - ribbon * .55, 1 + ribbon * .04, 1);
            rh.scale.set(1 + ribbon * .04, 1, 1 - ribbon * .55);

            bow.position.y = CFG.box.h / 2 + CFG.box.lid + .8 + ribbon * 1.35 + S.boxHide * 2.2;
            bow.position.z = ribbon * .55;
            bow.rotation.y = ribbon * .55;
            bow.rotation.x = -ribbon * .18;
            bow.scale.setScalar((1 - ribbon * .15) * (1 - S.boxHide * .75));

            bowLeft.position.set(-1.02 - ribbon * 1.25, .06 + ribbon * .38, .14 + ribbon * .16);
            bowRight.position.set(1.0 + ribbon * 1.22, .1 + ribbon * .34, .1 + ribbon * .14);
            bowLeft.rotation.set(.16 + ribbon * .22, .26 + ribbon * .28, -.22 - ribbon * .22 + flutter * .7);
            bowRight.rotation.set(.15 + ribbon * .2, -.23 - ribbon * .26, .2 + ribbon * .22 - flutter * .7);
            tailLeft.position.set(-.42 - ribbon * .58, -1.34 - ribbon * .3, .1 + ribbon * .16);
            tailRight.position.set(.38 + ribbon * .54, -1.28 - ribbon * .28, .06 + ribbon * .16);
            tailLeft.rotation.set(.04 + ribbon * .08, .08 + ribbon * .06, .16 + ribbon * .34 + flutter * .55);
            tailRight.rotation.set(-.03 - ribbon * .08, -.06 - ribbon * .05, -.12 - ribbon * .32 - flutter * .55);

            lidPivot.rotation.x = -lidOpen * 1.28 + Math.sin(clock.elapsedTime * 5.5) * .03 * burst;
            lid.position.y = CFG.box.lid / 2 + lidOpen * .26;
            lid.position.z = CFG.box.d / 2 + lidOpen * .2;

            if (collapsePull > 0) {
                const swirl = collapsePull * collapsePull;
                giftShell.position.lerp(collapseCenter, collapsePull * .96);
                giftShell.scale.setScalar(collapseScale);
                giftShell.rotation.y = swirl * 4.2;
                giftShell.rotation.z = swirl * 1.45;
            } else {
                giftShell.position.set(0, 0, 0);
                giftShell.scale.setScalar(1);
                giftShell.rotation.set(0, 0, 0);
            }

            glow.intensity = .3 + S.act1Mix * 1.6 + burst * 4.7 + S.happyMix * 2.1 + S.nameMix * 5.1 + romanceGlow * 2.5;
            glow.distance = 24 + S.act1Mix * 8 + burst * 18 + S.happyMix * 12 + S.nameMix * 26 + romanceGlow * 18;
            glow.position.y = 2.1 + S.act1Mix * 1.2 + burst * 1.8 + S.happyMix * 2.2 + S.nameMix * 3.6;

            for (const mesh of [base, lid, rv, rh]) {
                mesh.material.transparent = true;
                mesh.material.opacity = boxOpacity;
                mesh.visible = boxOpacity > .03;
            }
            bow.traverse((child) => {
                if (child.material) {
                    child.material.transparent = true;
                    child.material.opacity = boxOpacity;
                    child.visible = boxOpacity > .03;
                }
            });

            base.material.emissiveIntensity = (.24 + S.act1Mix * .18 + burst * .28) * boxOpacity;
            lid.material.emissiveIntensity = (.24 + S.act1Mix * .22 + burst * .24) * boxOpacity;
            rv.material.emissiveIntensity = (.46 + S.act1Mix * .3 + burst * .34) * boxOpacity;
            rh.material.emissiveIntensity = (.46 + S.act1Mix * .3 + burst * .34) * boxOpacity;

            sparkles.children.forEach((s) => {
                const d = s.userData;
                const t = clock.elapsedTime * d.v;
                const ambientMix = Math.max(S.burst * 0.82, S.floatMix, S.act1Mix * .55);
                if (!S.hasOpenedOnce && S.open < .08) {
                    const idleBlink = 0.74 + 0.26 * Math.max(0, Math.sin(clock.elapsedTime * d.blink + d.blinkPhase));
                    s.position.set(
                        bow.position.x + Math.cos(t * 1.35 + d.a) * (1.8 + d.closeR * 0.75),
                        bow.position.y + 0.55 + d.closeY * 0.22 + Math.sin(t * 1.6 + d.a) * 0.12,
                        bow.position.z + Math.sin(t * 1.35 + d.a) * (0.9 + d.closeR * 0.32)
                    );
                    s.scale.setScalar((0.12 + d.sizePulse * 0.3) * idleBlink);
                    s.material.opacity = 0.32 * idleBlink;
                } else if ((closing && closePhase > .08) || S.closeLoveMix > .08) {
                    const orbitAroundBow = 1 - THREE.MathUtils.smoothstep(closePhase, .88, .995);
                    const ringMix = Math.max(orbitAroundBow, S.closeLoveMix * 0.92);
                    const shimmer = 0.84 + Math.max(0, Math.sin(clock.elapsedTime * d.blink + d.blinkPhase)) * (0.18 + d.twinkleAmp * 0.34);
                    const flicker = 0.94 + Math.max(0, Math.sin(clock.elapsedTime * d.flicker + d.flickerPhase)) * 0.08;
                    const flash = d.flashChance ? Math.max(0, Math.sin(clock.elapsedTime * d.flashSpeed + d.flashPhase)) ** 10 * 0.16 : 0;
                    const blink = (d.twinkleBase * d.glowBias) + (shimmer - 0.84) + (flicker - 0.94) + flash;
                    const loveLift = S.closeLoveMix > .08 ? (1.6 + S.closeLoveMix * 1.1) : 0;
                    s.position.set(
                        bow.position.x + Math.cos(t * 1.9 + d.a) * d.closeR * ringMix,
                        bow.position.y + loveLift + d.closeY * ringMix + Math.sin(t * 2.2 + d.a) * 0.18 * ringMix,
                        bow.position.z + Math.sin(t * 1.9 + d.a) * d.closeR * 0.58 * ringMix
                    );
                    const sc = (0.18 + ringMix * (0.34 + d.sizePulse * 0.55)) * blink;
                    s.scale.setScalar(sc);
                    s.material.opacity = ringMix * (0.64 + blink * 0.26 + flash * 0.4);
                } else {
                    s.position.set(
                        Math.cos(t + d.a) * d.r * (.3 + ambientMix),
                        7 + S.textMix * 4 + romanceGlow * 1.1 + ambientMix * d.h + Math.sin(t * 1.4) * .5,
                        Math.sin(t + d.a) * d.r * .45 * (.3 + ambientMix)
                    );
                    const shimmer = 0.84 + Math.max(0, Math.sin(clock.elapsedTime * d.blink + d.blinkPhase)) * (0.18 + d.twinkleAmp * 0.34);
                    const flicker = 0.94 + Math.max(0, Math.sin(clock.elapsedTime * d.flicker + d.flickerPhase)) * 0.08;
                    const flash = d.flashChance ? Math.max(0, Math.sin(clock.elapsedTime * d.flashSpeed + d.flashPhase)) ** 10 * 0.18 : 0;
                    const blink = (d.twinkleBase * d.glowBias) + (shimmer - 0.84) + (flicker - 0.94) + flash;
                    const sc = ((S.act1Mix * .45) + (S.happyMix * 1.05) + (S.nameMix * 1.9) + S.floatMix + romanceGlow * .35) * (.38 + d.sizePulse * 0.72 + 0.34 * Math.sin(t + d.a + d.shimmerPhase) ** 2) * blink;
                    s.scale.setScalar(sc);
                    s.material.opacity = Math.max(0.18, S.act1Mix * .35, S.happyMix * 0.98, S.nameMix * 1.0, S.floatMix * .9, romanceGlow * .72) * (0.72 + blink * 0.28 + flash * 0.35);
                }
            });

            photoItems.forEach((group, index) => {
                const pulse = .92 + S.textMix * .45 + S.floatMix * .28 + Math.sin(clock.elapsedTime * 2.2 + index) * .03 * Math.max(S.textMix, S.floatMix);
                if (group !== focusPhoto || S.focus < .02) {
                    group.scale.lerp(new THREE.Vector3(pulse, pulse, pulse), dt * 4);
                }
                group.position.x = THREE.MathUtils.lerp(group.position.x, group.position.x * (1 - S.textMix * .03), dt * 3.2);
                group.position.y += Math.sin(clock.elapsedTime * 1.1 + index) * .003 * Math.max(S.textMix, S.floatMix);
                if (group.children[1]?.material) group.children[1].material.emissiveIntensity = group.userData.baseFrameEmissive || 0;
            });

            updateSky(dt);
            if (bloomPass) {
                bloomPass.strength = 0.26 + S.act1Mix * 0.1 + S.happyMix * 0.1 + S.nameMix * 0.18 + romanceGlow * 0.14;
                bloomPass.radius = 0.38 + romanceGlow * 0.1;
            }
        }

        function updateSky(dt) {
            if (!skyGroup) return;
            const romanceGlow = Math.max(S.romanceMix, S.closeLoveMix * .8);
            skyGroup.children.forEach((child, index) => {
                const data = child.userData;
                const time = clock.elapsedTime * (data.speed || data.drift || 0.2) + data.off;
                if (data.type === 'veil') {
                    child.position.x += Math.sin(time * .25 + index) * data.drift * dt;
                    child.position.y += Math.cos(time * .2 + index) * data.drift * dt * .4;
                    child.rotation.z += dt * (0.007 + data.drift * 0.02);
                    const pulse = 0.5 + 0.5 * Math.sin(clock.elapsedTime * data.pulseSpeed + data.pulsePhase);
                    const shimmer = Math.max(0, Math.sin(clock.elapsedTime * data.shimmerSpeed + data.shimmerPhase)) * data.shimmerStrength;
                    const driftGlow = Math.max(0, Math.sin(time * (0.42 + data.drift))) * data.pulseStrength * 0.7;
                    child.material.opacity = THREE.MathUtils.clamp(
                        data.baseOpacity + pulse * data.pulseStrength + driftGlow + shimmer + S.act1Mix * 0.015 + romanceGlow * 0.05,
                        0.04,
                        0.18
                    );
                } else {
                    child.position.y += Math.sin(time * .5 + index) * data.drift * dt * .12;
                    const shimmer = 0.84 + Math.max(0, Math.sin(clock.elapsedTime * data.shimmerSpeed + data.shimmerPhase)) * 0.18;
                    const flicker = 0.95 + Math.max(0, Math.sin(clock.elapsedTime * data.flickerSpeed + data.flickerPhase)) * 0.08;
                    const flash = data.flashChance ? Math.max(0, Math.sin(clock.elapsedTime * data.flashSpeed + data.flashPhase)) ** 12 * 0.22 : 0;
                    child.material.opacity = THREE.MathUtils.clamp(data.baseOpacity * data.glowBias + (shimmer - 0.84) + (flicker - 0.95) + flash + S.act1Mix * 0.04 + romanceGlow * 0.08, 0.08, .96);
                    const twinkle = data.baseScale * (0.84 + (shimmer - 0.84) * 0.85 + (flicker - 0.95) * 0.5 + flash * 0.35);
                    child.scale.setScalar(twinkle);
                }
            });
        }

        function updateCamera(dt) {
            const introMix = THREE.MathUtils.smoothstep(S.act1Mix, 0.0, 1.0);
            const textMix = THREE.MathUtils.smoothstep(S.act2Mix, 0.0, 1.0);
            const finaleMix = THREE.MathUtils.smoothstep(S.act3Mix, 0.0, 1.0);
            const resolveMix = THREE.MathUtils.smoothstep(S.floatMix, 0.08, 0.58);

            const targetPos = CAM.introPos.clone()
                .lerp(CAM.textPos, textMix)
                .lerp(CAM.finalePos, finaleMix)
                .lerp(CAM.resolvePos, resolveMix);
            const targetLook = CAM.introLook.clone()
                .lerp(CAM.textLook, textMix)
                .lerp(CAM.finaleLook, finaleMix)
                .lerp(CAM.resolveLook, resolveMix);

            const sway = Math.sin(clock.elapsedTime * 0.55) * 0.28 * (0.35 + introMix * 0.35);
            const lift = Math.cos(clock.elapsedTime * 0.42) * 0.18 * (0.2 + finaleMix * 0.45);
            targetPos.x += sway;
            targetPos.y += lift;

            if (S.focus > .02 && focusPhoto) {
                targetPos.lerp(CAM.finalePos.clone().add(CAM.focusOffset), S.focus * 0.82);
                targetLook.lerp(new THREE.Vector3(0, 0.25, -12.5), S.focus * 0.9);
            }

            camera.position.lerp(targetPos, dt * 2.8);
            camLook.lerp(targetLook, dt * 3.2);
            camera.lookAt(camLook);

            const targetFov = THREE.MathUtils.lerp(43, 39, textMix * 0.9 + finaleMix * 0.08) - finaleMix * 3.1 + resolveMix * 3.8 - S.focus * 2.8;
            camera.fov += (targetFov - camera.fov) * dt * 3;
            camera.updateProjectionMatrix();
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), .033);
            const t = clock.elapsedTime;
            const transitioningOpen = S.target === 1 && S.open < .94;
            const transitioningClose = S.target === 0 && S.open > .06;
            if ((transitioningOpen || transitioningClose) && S.closeLoveMix <= .08) {
                S.rot.y += (0 - S.rot.y) * 14 * dt;
                S.rot.x += (-0.02 - S.rot.x) * 6.2 * dt;
            } else if (S.closeLoveMix > .08) {
                S.rot.y += (0 - S.rot.y) * 8.4 * dt;
                S.rot.x += (0 - S.rot.x) * 5.6 * dt;
            } else if (S.textMix > .04) {
                S.rot.y += (0 - S.rot.y) * 7.4 * dt;
                S.rot.x += (-0.02 - S.rot.x) * 3.6 * dt;
            } else {
                S.rot.y += CFG.autoRotateSpeed * dt;
                S.rot.x += (-0.02 - S.rot.x) * 2.2 * dt;
            }
            main.rotation.y = S.rot.y;
            main.rotation.x = S.rot.x;
            main.position.y = -1 + Math.sin(t * .6) * .15;
            updateGift(dt);
            updateWishes(dt);
            updateCamera(dt);
            particles.forEach((p) => p.update(dt, S.burst, S.happyMix, S.nameMix, S.textMix, S.floatMix));
            composer.render();
        }

        init();
    </script>
